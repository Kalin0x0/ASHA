{{- if .Values.agent.enabled }}
# ── Asha Agent — ServiceAccount + RBAC ─────────────────────────────────────
# When ASHA_DRIVER=kubernetes the agent creates/deletes Pods, Services, and
# Ingresses in the session namespace. The Role here grants exactly those verbs
# and nothing more (principle of least privilege).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: asha-agent
  labels:
    {{- include "asha.labels" . | nindent 4 }}
---
# ClusterRole: lets the agent read node/zone info (used for heartbeat reporting)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: asha-agent-node-reader
  labels:
    {{- include "asha.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: asha-agent-node-reader
  labels:
    {{- include "asha.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: asha-agent-node-reader
subjects:
  - kind: ServiceAccount
    name: asha-agent
    namespace: {{ .Release.Namespace }}
---
# Namespaced Role: full control over session Pods/Services/Ingresses
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: asha-agent-session-manager
  namespace: {{ .Values.agent.k8sSessionNs | default "asha-sessions" }}
  labels:
    {{- include "asha.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, services]
    verbs: [create, get, list, watch, delete]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [create, get, delete]
  # Metrics API — optional; collectStats falls back gracefully if RBAC is missing
  - apiGroups: [metrics.k8s.io]
    resources: [pods]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: asha-agent-session-manager
  namespace: {{ .Values.agent.k8sSessionNs | default "asha-sessions" }}
  labels:
    {{- include "asha.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: asha-agent-session-manager
subjects:
  - kind: ServiceAccount
    name: asha-agent
    namespace: {{ .Release.Namespace }}
{{- end }}
