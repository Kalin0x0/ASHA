apiVersion: apps/v1
kind: Deployment
metadata:
  name: asha-web
  labels:
    app.kubernetes.io/name: asha-web
    {{- include "asha.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: asha-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: asha-web
    spec:
      containers:
        - name: web
          image: {{ printf "%s/asha-web:%s" .Values.image.registry .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
          env:
            - name: NODE_ENV
              value: production
---
apiVersion: v1
kind: Service
metadata:
  name: asha-web
  labels:
    app.kubernetes.io/name: asha-web
spec:
  selector:
    app.kubernetes.io/name: asha-web
  ports:
    - port: {{ .Values.web.port }}
      targetPort: {{ .Values.web.port }}
