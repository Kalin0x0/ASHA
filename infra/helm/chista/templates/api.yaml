apiVersion: apps/v1
kind: Deployment
metadata:
  name: chista-api
  labels:
    app.kubernetes.io/name: chista-api
    {{- include "chista.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: chista-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chista-api
    spec:
      containers:
        - name: api
          image: {{ printf "%s/chista-api:%s" .Values.image.registry .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: NODE_ENV
              value: production
            - name: API_PORT
              value: {{ .Values.api.port | quote }}
            - name: DATABASE_URL
              value: {{ .Values.postgres.url | quote }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            - name: CHISTA_PUBLIC_URL
              value: {{ printf "https://%s" .Values.domain | quote }}
            - name: JWT_ACCESS_SECRET
              value: {{ .Values.secrets.jwtAccess | quote }}
            - name: JWT_REFRESH_SECRET
              value: {{ .Values.secrets.jwtRefresh | quote }}
            - name: SESSION_TOKEN_SECRET
              value: {{ .Values.secrets.sessionToken | quote }}
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chista-api
  labels:
    app.kubernetes.io/name: chista-api
spec:
  selector:
    app.kubernetes.io/name: chista-api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
